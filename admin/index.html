<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - Los Sartenes</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .sidebar {
            min-height: 100vh;
            background-color: #1a531a;
            color: white;
        }
        .sidebar a {
            color: #e2e8f0;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar a.active {
            color: white;
            background-color: rgba(255, 255, 255, 0.1);
        }
        .content {
            background-color: #f8f9fa;
        }
    </style>
</head>
<body class="font-sans">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="sidebar w-64 p-4">
            <div class="text-2xl font-bold mb-8 text-center">
                Los Sartenes
                <div class="text-sm font-normal">Panel de Administración</div>
            </div>
            <nav class="space-y-2">
                <a href="#" class="block p-3 rounded-lg active">
                    <i class="fas fa-utensils mr-2"></i> Platos del Día
                </a>
                <a href="#" class="block p-3 rounded-lg">
                    <i class="fas fa-cog mr-2"></i> Configuración
                </a>
                <a href="/" class="block p-3 rounded-lg mt-8 text-sm">
                    <i class="fas fa-arrow-left mr-2"></i> Volver al sitio
                </a>
            </nav>
        </div>

        <!-- Contenido principal -->
        <div class="content flex-1 overflow-y-auto p-8">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-2xl font-bold text-gray-800">Gestión de Platos del Día</h1>
                <button id="btnNuevoPlato" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg flex items-center">
                    <i class="fas fa-plus mr-2"></i> Nuevo Plato
                </button>
            </div>

            <!-- Lista de platos -->
            <div id="listaPlatos" class="bg-white rounded-lg shadow overflow-hidden">
                <div class="p-4 border-b border-gray-200">
                    <div class="grid grid-cols-12 gap-4 font-medium text-gray-600">
                        <div class="col-span-1">#</div>
                        <div class="col-span-3">Imagen</div>
                        <div class="col-span-3">Título</div>
                        <div class="col-span-2">Precio</div>
                        <div class="col-span-2">Estado</div>
                        <div class="col-span-1">Acciones</div>
                    </div>
                </div>
                <div id="platosContainer" class="divide-y divide-gray-200">
                    <!-- Los platos se cargarán aquí dinámicamente -->
                    <div class="p-4 text-center text-gray-500">Cargando platos...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para agregar/editar plato -->
    <div id="modalPlato" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg w-full max-w-2xl">
            <div class="p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold" id="modalTitulo">Nuevo Plato</h2>
                    <button id="btnCerrarModal" class="text-gray-500 hover:text-gray-700">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                
                <form id="formPlato" class="space-y-4">
                    <input type="hidden" id="platoId">
                    
                    <div>
                        <label for="titulo" class="block text-sm font-medium text-gray-700">Título</label>
                        <input type="text" id="titulo" name="titulo" required 
                               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500">
                    </div>
                    
                    <div>
                        <label for="descripcion" class="block text-sm font-medium text-gray-700">Descripción</label>
                        <textarea id="descripcion" name="descripcion" rows="3"
                                 class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500"></textarea>
                    </div>
                    
                    <div>
                        <label for="valor" class="block text-sm font-medium text-gray-700">Precio ($)</label>
                        <input type="number" id="valor" name="valor" step="0.01" min="0" required
                               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-green-500 focus:ring-green-500">
                    </div>
                    
                    <div>
                        <label for="imagen" class="block text-sm font-medium text-gray-700">Imagen</label>
                        <input type="file" id="imagen" name="imagen" accept="image/*" class="mt-1 block w-full">
                        <p class="mt-1 text-sm text-gray-500">Sube una imagen para este plato (formato JPG, PNG)</p>
                        <div id="vistaPreviaImagen" class="mt-2 hidden">
                            <img id="imagenPrevia" src="#" alt="Vista previa" class="h-32 object-cover rounded">
                        </div>
                    </div>
                    
                    <div class="flex items-center">
                        <input id="activo" name="activo" type="checkbox" class="h-4 w-4 text-green-600 focus:ring-green-500 border-gray-300 rounded">
                        <label for="activo" class="ml-2 block text-sm text-gray-700">Activo (visible en el sitio)</label>
                    </div>
                    
                    <div class="flex justify-end space-x-3 pt-4">
                        <button type="button" id="btnCancelar" class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">
                            Cancelar
                        </button>
                        <button type="submit" class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                            Guardar Plato
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Variables globales
        let platos = [];
        
        // Elementos del DOM
        const platosContainer = document.getElementById('platosContainer');
        const modalPlato = document.getElementById('modalPlato');
        const formPlato = document.getElementById('formPlato');
        const btnNuevoPlato = document.getElementById('btnNuevoPlato');
        const btnCerrarModal = document.getElementById('btnCerrarModal');
        const btnCancelar = document.getElementById('btnCancelar');
        const modalTitulo = document.getElementById('modalTitulo');
        const imagenInput = document.getElementById('imagen');
        const imagenPrevia = document.getElementById('imagenPrevia');
        const vistaPreviaImagen = document.getElementById('vistaPreviaImagen');
        
        // Event Listeners
        document.addEventListener('DOMContentLoaded', cargarPlatos);
        btnNuevoPlato.addEventListener('click', mostrarFormularioNuevo);
        btnCerrarModal.addEventListener('click', cerrarModal);
        btnCancelar.addEventListener('click', cerrarModal);
        formPlato.addEventListener('submit', guardarPlato);
        imagenInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagenPrevia.src = e.target.result;
                    vistaPreviaImagen.classList.remove('hidden');
                }
                reader.readAsDataURL(file);
            }
        });
        
        // Funciones
        async function cargarPlatos() {
            try {
                console.log('Cargando lista de platos...');
                const response = await fetch('/api/platos');
                if (!response.ok) {
                    const error = await response.json().catch(() => ({}));
                    throw new Error(error.error || 'Error al cargar los platos');
                }
                platos = await response.json();
                console.log('Platos cargados:', platos);
                mostrarPlatos();
            } catch (error) {
                console.error('Error al cargar platos:', error);
                platosContainer.innerHTML = `
                    <div class="p-4 text-center text-red-500">
                        Error al cargar los platos: ${error.message}. Por favor, recarga la página.
                    </div>
                `;
            }
        }
        
        function mostrarPlatos() {
            if (platos.length === 0) {
                platosContainer.innerHTML = `
                    <div class="p-4 text-center text-gray-500">
                        No hay platos registrados. Haz clic en "Nuevo Plato" para agregar uno.
                    </div>
                `;
                return;
            }
            
            platosContainer.innerHTML = '';
            
            platos.forEach((plato, index) => {
                const platoElement = document.createElement('div');
                platoElement.className = 'p-4 hover:bg-gray-50';
                platoElement.innerHTML = `
                    <div class="grid grid-cols-12 gap-4 items-center">
                        <div class="col-span-1">${index + 1}</div>
                        <div class="col-span-3">
                            <img src="${plato.imagen_url ? plato.imagen_url : '/images/platos/placeholder.jpg'}" 
                                 alt="${plato.titulo}" 
                                 class="h-16 w-16 object-cover rounded">
                        </div>
                        <div class="col-span-3 font-medium">${plato.titulo}</div>
                        <div class="col-span-2">$${parseFloat(plato.valor).toFixed(2)}</div>
                        <div class="col-span-2">
                            <span class="px-2 py-1 text-xs rounded-full ${plato.activo ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                                ${plato.activo ? 'Activo' : 'Inactivo'}
                            </span>
                        </div>
                        <div class="col-span-1 flex space-x-2">
                            <button onclick="editarPlato(${plato.id})" class="text-blue-500 hover:text-blue-700">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="eliminarPlato(${plato.id})" class="text-red-500 hover:text-red-700">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
                platosContainer.appendChild(platoElement);
            });
        }
        
        function mostrarFormularioNuevo() {
            formPlato.reset();
            document.getElementById('platoId').value = '';
            modalTitulo.textContent = 'Nuevo Plato';
            vistaPreviaImagen.classList.add('hidden');
            imagenInput.required = true;
            modalPlato.classList.remove('hidden');
            modalPlato.classList.add('flex');
        }
        
        function cerrarModal() {
            modalPlato.classList.add('hidden');
            modalPlato.classList.remove('flex');
        }
        
        async function guardarPlato(e) {
            e.preventDefault();
            
            const platoId = document.getElementById('platoId').value;
            const esNuevo = !platoId;
            
            try {
                // Crear objeto con los datos del formulario
                const formData = new FormData();
                const titulo = document.getElementById('titulo').value;
                const descripcion = document.getElementById('descripcion').value;
                const valor = document.getElementById('valor').value;
                const activo = document.getElementById('activo').checked;
                
                // Agregar campos directamente al formData
                formData.append('titulo', titulo);
                formData.append('descripcion', descripcion);
                formData.append('valor', valor);
                formData.append('activo', activo);
                
                console.log('Datos del formulario:', {
                    titulo,
                    descripcion,
                    valor,
                    activo,
                    platoId,
                    esNuevo
                });
                
                // Agregar la imagen solo si se seleccionó una
                const imagenInput = document.getElementById('imagen');
                if (imagenInput.files[0]) {
                    console.log('Se adjuntó una nueva imagen:', imagenInput.files[0].name);
                    formData.append('imagen', imagenInput.files[0]);
                } else if (!esNuevo) {
                    // Si es una actualización y no se seleccionó nueva imagen, mantener la existente
                    const imagenActual = document.querySelector('#vistaPreviaImagen img');
                    if (imagenActual && imagenActual.src) {
                        // Usar la URL completa de la imagen existente
                        formData.append('imagen_url', imagenActual.src);
                        console.log('Manteniendo imagen existente:', imagenActual.src);
                    }
                }
                
                // Agregar el ID si es una actualización
                if (!esNuevo) {
                    formData.append('id', platoId);
                    console.log('Actualizando plato existente con ID:', platoId);
                } else {
                    console.log('Creando nuevo plato');
                }
                
                console.log('Enviando datos:', Object.fromEntries(formData));
                
                const response = await fetch('/api/platos', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.error || 'Error al guardar el plato');
                }
                
                const data = await response.json();
                console.log('Respuesta del servidor:', data);
                
                await cargarPlatos();
                cerrarModal();
                alert(`Plato ${esNuevo ? 'creado' : 'actualizado'} correctamente`);
                
            } catch (error) {
                console.error('Error:', error);
                alert(`Error al ${esNuevo ? 'crear' : 'actualizar'} el plato: ${error.message}`);
            }
        }
        
        async function editarPlato(id) {
            try {
                const plato = platos.find(p => p.id === id);
                if (!plato) throw new Error('Plato no encontrado');
                
                document.getElementById('platoId').value = plato.id;
                document.getElementById('titulo').value = plato.titulo || '';
                document.getElementById('descripcion').value = plato.descripcion || '';
                document.getElementById('valor').value = plato.valor || '';
                document.getElementById('activo').checked = plato.activo || false;
                
                // Mostrar imagen actual si existe
                const vistaPrevia = document.getElementById('vistaPreviaImagen');
                const imagenPrevia = document.getElementById('imagenPrevia');
                if (plato.imagen_url) {
                    // Si es una URL completa o relativa
                    if (plato.imagen_url.startsWith('http') || plato.imagen_url.startsWith('/')) {
                        imagenPrevia.src = plato.imagen_url;
                    } else {
                        // Si es solo un nombre de archivo, asumir que está en /images/platos/
                        imagenPrevia.src = '/images/platos/' + plato.imagen_url;
                    }
                    vistaPrevia.classList.remove('hidden');
                } else {
                    vistaPrevia.classList.add('hidden');
                }
                
                modalTitulo.textContent = 'Editar Plato';
                imagenInput.required = false;
                modalPlato.classList.remove('hidden');
                modalPlato.classList.add('flex');
                
            } catch (error) {
                console.error('Error al cargar el plato:', error);
                alert('Error al cargar el plato para editar: ' + error.message);
            }
        }
        
        async function eliminarPlato(id) {
            if (!confirm('¿Estás seguro de que deseas eliminar este plato?')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/platos/${id}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || 'Error al eliminar el plato');
                }
                
                await cargarPlatos();
                alert('Plato eliminado correctamente');
                
            } catch (error) {
                console.error('Error:', error);
                alert(`Error al eliminar el plato: ${error.message}`);
            }
        }
        
        // Hacer las funciones accesibles globalmente
        window.editarPlato = editarPlato;
        window.eliminarPlato = eliminarPlato;
    </script>
</body>
</html>
